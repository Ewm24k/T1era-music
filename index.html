<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>T1ERA Music Studio</title>
    
    <!-- PWA Configuration -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="T1ERA">
    <link rel="apple-touch-icon" href="assets/icons/icon-192.png">

    <style>
        /* Base Reset */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            background-color: #000000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Courier New", monospace;
            overflow: hidden;
            color: #ffffff;
        }

        /* Responsive Viewport Wrapper */
        .stage-wrapper {
            position: relative;
            width: 100dvw;
            height: 100dvh;
            overflow: hidden;
        }

        /* Orientation Enforcement Alert */
        #orientation-warning {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            z-index: 2000;
            color: #ffffff;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 30px;
        }
        #orientation-warning svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            fill: #ffffff;
            animation: rotateDevice 2s infinite ease-in-out;
        }
        @keyframes rotateDevice {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(-90deg); }
            100% { transform: rotate(0deg); }
        }
        #orientation-warning h2 {
            font-size: 1.2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Show warning on mobile portrait view */
        @media (orientation: portrait) and (max-width: 1024px) {
            #orientation-warning {
                display: flex;
            }
            #main-content {
                display: none;
            }
        }

        /* Tap to Enter Overlay */
        #interactive-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            cursor: pointer;
            transition: opacity 1.2s ease-in-out;
        }
        .pulse-text {
            font-size: 1.1rem;
            letter-spacing: 4px;
            animation: pulse 2s infinite;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.7);
            text-transform: uppercase;
        }
        @keyframes pulse {
            0% { opacity: 0.3; }
            50% { opacity: 1; }
            100% { opacity: 0.3; }
        }

        /* Loading Typewriter Screen Area */
        #loading-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 50;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
            pointer-events: none;
        }
        .glow-text {
            font-size: 1.8rem;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            letter-spacing: 2px;
            text-shadow: 0 0 10px #ffffff, 0 0 20px #ffffff, 0 0 30px #ffffff;
            border-right: 2px solid rgba(255, 255, 255, 0.75);
            white-space: normal;
            display: inline-block;
        }
        .blink {
            animation: blink-caret 0.75s step-end infinite;
        }
        @keyframes blink-caret {
            from, to { border-color: transparent }
            50% { border-color: white }
        }

        /* Cinematic Landing Screen */
        #landing-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            opacity: 0;
            transition: opacity 2.5s cubic-bezier(0.25, 1, 0.5, 1);
            pointer-events: none;
        }
        #landing-screen.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* Auto-Fitting Video Stage */
        .video-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000000;
        }
        .video-bg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            transition: opacity 2.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* UI layer */
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 15;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: calc(20px + env(safe-area-inset-top)) calc(20px + env(safe-area-inset-right)) calc(20px + env(safe-area-inset-bottom)) calc(20px + env(safe-area-inset-left));
        }

        /* "Enter Studio" Action Button */
        .enter-studio-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-bottom: 40px;
        }
        .btn-enter-studio {
            pointer-events: auto;
            opacity: 0;
            transform: translateY(20px);
            padding: 15px 40px;
            font-size: 0.95rem;
            font-weight: 500;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #ffffff;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            cursor: pointer;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5), 0 0 20px rgba(255, 255, 255, 0.1);
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .btn-enter-studio.show {
            opacity: 1;
            transform: translateY(0);
        }
        .btn-enter-studio:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.8);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
            letter-spacing: 5px;
        }

        /* Transparent Auth Glassmorphism Overlay (Sign Up & Login) */
        #auth-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px) saturate(110%); /* Subtle aesthetic video blurring */
            -webkit-backdrop-filter: blur(5px) saturate(110%);
            z-index: 30;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        }
        #auth-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .auth-card {
            width: 90%;
            max-width: 380px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            text-align: center;
        }
        .auth-header {
            font-size: 1.1rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 25px;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .auth-input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            color: #ffffff;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.3s ease;
        }
        .auth-input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }
        .auth-input:focus {
            border-color: rgba(255, 255, 255, 0.6);
            background: rgba(0, 0, 0, 0.5);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
        }
        .auth-btn {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.06);
            color: #ffffff;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 5px;
        }
        .auth-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.8);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }
        .auth-switch {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 15px;
            cursor: pointer;
            letter-spacing: 1px;
            transition: color 0.3s ease;
        }
        .auth-switch span {
            color: #ffffff;
            text-decoration: underline;
        }
        .auth-switch:hover {
            color: rgba(255, 255, 255, 0.8);
        }
        .auth-error {
            font-size: 0.75rem;
            color: #ff4a4a;
            margin-top: 5px;
            letter-spacing: 1px;
            text-shadow: 0 0 8px rgba(255, 74, 74, 0.3);
            display: none;
        }

        /* Authentic Verification Checking UI Terminal (Center Screen) */
        #verification-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 40;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.8s ease-in-out;
        }
        #verification-screen.active {
            opacity: 1;
            pointer-events: auto;
        }
        .terminal-box {
            text-align: center;
            padding: 20px;
        }
        .terminal-text {
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.2rem;
            letter-spacing: 2px;
            color: #ffffff;
            text-shadow: 0 0 10px #ffffff;
            display: inline-block;
        }

        /* Hamburger Navigation */
        .menu-btn {
            position: absolute;
            top: calc(20px + env(safe-area-inset-top));
            right: calc(20px + env(safe-area-inset-right));
            width: 40px;
            height: 40px;
            cursor: pointer;
            z-index: 100;
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .menu-btn span {
            display: block;
            width: 24px;
            height: 2px;
            background: #ffffff;
            margin: 3px 0;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 0 8px rgba(0,0,0,0.5);
        }
        .menu-btn.active span:nth-child(1) { transform: translateY(8px) rotate(45deg); }
        .menu-btn.active span:nth-child(2) { opacity: 0; transform: scaleX(0); }
        .menu-btn.active span:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }

        .side-menu {
            position: absolute;
            top: 0;
            right: -320px;
            width: 320px;
            height: 100%;
            background: rgba(5, 5, 5, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 90;
            transition: right 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 40px;
            border-left: 1px solid rgba(255, 255, 255, 0.05);
        }
        .side-menu.open { right: 0; }
        .menu-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
            opacity: 0;
            visibility: hidden;
            z-index: 85;
            transition: all 0.5s ease;
        }
        .menu-overlay.active { opacity: 1; visibility: visible; }
        .nav-links { list-style: none; }
        .nav-links li { margin: 25px 0; }
        .nav-links a {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 300;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }
        .nav-links a:hover {
            color: #ffffff;
            letter-spacing: 5px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>

    <!-- Landscape Warning Screen -->
    <div id="orientation-warning">
        <svg viewBox="0 0 24 24">
            <path d="M16 1H8C6.34 1 5 2.34 5 4v16c0 1.66 1.34 3 3 3h8c1.66 0 3-1.34 3-3V4c0-1.66-1.34-3-3-3zm-2 20h-4v-1h4v1zm3.25-3H6.75V4h10.5V18z"/>
        </svg>
        <h2>Please rotate device to landscape</h2>
    </div>

    <!-- Main Viewport Layer -->
    <div id="main-content" class="stage-wrapper">

        <!-- Phase 1: Tap-To-Enter Overlay -->
        <div id="interactive-overlay">
            <div class="pulse-text">Tap to Enter T1ERA</div>
        </div>

        <!-- Phase 2: Loading & Typewriter Stage -->
        <div id="loading-screen">
            <div class="glow-text blink" id="typewriter"></div>
        </div>

        <!-- Phase 3: Video Stage Landing Screen -->
        <div id="landing-screen">
            <div class="video-container">
                <video id="vid1" class="video-bg" playsinline webkit-playsinline muted src="assets/videos/vid1.mp4"></video>
                <video id="vid2" class="video-bg" playsinline webkit-playsinline loop muted style="opacity: 0;" src="assets/videos/vid2.mp4"></video>
            </div>

            <!-- Foreground UI controls overlay -->
            <div class="ui-layer">
                <div class="header-placeholder"></div>
                <div class="enter-studio-wrapper">
                    <button class="btn-enter-studio" id="enter-studio-btn">Enter Studio</button>
                </div>
            </div>

            <!-- Hamburger Button and Slide menu -->
            <div class="menu-btn" id="menu-toggle">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <div class="menu-overlay" id="menu-overlay"></div>
            <nav class="side-menu" id="side-menu">
                <ul class="nav-links">
                    <li><a href="#">Home</a></li>
                    <li><a href="#">Studio</a></li>
                    <li><a href="#">Tracks</a></li>
                    <li><a href="#">About</a></li>
                    <li><a href="#">Contact</a></li>
                </ul>
            </nav>
        </div>

        <!-- Phase 4: Transparent Glassmorphic Auth Modal (Sign Up & Login Toggle) -->
        <div id="auth-overlay">
            <div class="auth-card" id="auth-card">
                <div class="auth-header" id="auth-title">Sign In</div>
                
                <form class="auth-form" id="auth-form">
                    <input type="email" id="auth-email" class="auth-input" placeholder="EMAIL ADDRESS" required autocomplete="email">
                    <input type="password" id="auth-password" class="auth-input" placeholder="PASSWORD" required autocomplete="current-password">
                    <button type="submit" id="auth-submit-btn" class="auth-btn">Access</button>
                </form>

                <div class="auth-error" id="auth-error-msg">Incorrect credentials</div>
                <div class="auth-switch" id="auth-switch-view">Don't have an account? <span>Sign Up</span></div>
            </div>
        </div>

        <!-- Phase 5: Verification Checking Console Screen -->
        <div id="verification-screen">
            <div class="terminal-box">
                <div class="terminal-text blink" id="verification-terminal"></div>
            </div>
        </div>

    </div>

    <!-- Background Audio Asset -->
    <audio id="bg-sound" src="assets/audio/ambient.mp3" preload="auto" loop></audio>

    <!-- App Logic Module (Handles all UI operations, typewriter, and Firebase Auth) -->
    <script type="module" src="assets/js/app.js"></script>
</body>
</html>
